<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultSync - Secure Images</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 4rem 2.5rem;
            text-align: center;
            margin-top: 2rem;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-section:hover, .upload-section.dragover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 123, 138, 0.2);
        }
        .upload-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }
        .upload-section:hover .upload-icon {
            transform: translateY(-5px);
        }
        .file-input {
            display: none;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #047c8c;
        }
    </style>
</head>
<body>
    <div class="alert-container" id="alertContainer"></div>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-name">VaultSync</span>
            </div>
            
            <ul class="sidebar-menu">
                <li class="menu-item" id="menu-passwords" onclick="window.location.href = '/home'">
                    <button><i class="fas fa-key"></i> Passwords</button>
                </li>
                <li class="menu-item active" id="menu-notes" onclick="window.location.href = '/notes'">
                    <button><i class="fas fa-file-alt"></i> Secure Notes</button>
                </li>
            </ul>

            <div class="sidebar-footer">
                <li class="menu-item" style="list-style: none;">
                    <button onclick="handleLogout()" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Log Out</button>
                </li>
            </div>
        </aside>

        <!-- Main Body Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 class="page-title" id="pageTitle">Secure Image Vault</h1>
            </header>

            <div class="content-body">
                <a href="/notes" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Secure Notes
                </a>

                <!-- UPLOAD SECTION -->
                <div class="upload-section glass" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <h3>Drag & Drop an image here, or click to browse</h3>
                    <p style="color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 0.5rem;">Supports PNG, JPG, JPEG, GIF, WEBP</p>
                    <input type="file" id="fileInput" class="file-input" accept="image/*" onchange="uploadImage(this.files[0])">
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-message" class="toast hidden" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script>
        let currentUser = null;

        // Toast notification helpers
        function showToast(message, type) {
            const toast = document.getElementById('toast-message');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.remove('hidden');
            setTimeout(hideToast, 3000);
        }

        // Helper to show sticky status toast
        function showStickyToast(message, type) {
            const toast = document.getElementById('toast-message');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.remove('hidden');
        }

        function hideToast() {
            const toast = document.getElementById('toast-message');
            toast.className = 'toast hidden';
        }

        // --- PROFILE LOADING ---
        async function loadProfile() {
            try {
                const response = await fetch('/api/user/profile');
                if (response.ok) {
                    const result = await response.json();
                    currentUser = result.user;
                } else if (response.status === 401) {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error("Error loading user profile", err);
            }
        }

        // --- UPLOAD IMAGE ---
        async function uploadImage(file) {
            if (!file) return;

            // Check file type
            const allowedTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/gif', 'image/webp'];
            if (!allowedTypes.includes(file.type)) {
                showToast("Invalid file type. Please upload an image.", "error");
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                showStickyToast("Uploading secure image...", "success");
                const response = await fetch('/api/images', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    showToast("Image uploaded and saved successfully!", 'success');
                } else {
                    showToast(result.message || "Failed to save image.", 'error');
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to upload image due to connection error.", "error");
            }
        }

        // --- LOGOUT CONTROLLER ---
        async function handleLogout() {
            if (!confirm("Confirm logging out of VaultSync?")) return;
            try {
                const response = await fetch('/api/logout', { method: 'POST' });
                const result = await response.json();
                if (response.ok) {
                    localStorage.removeItem('currentUser');
                    window.location.href = result.redirect;
                }
            } catch (err) {
                console.error("Logout failed", err);
            }
        }

        // --- DRAG & DROP EVENT LISTENERS ---
        const dropZone = document.getElementById('dropZone');
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) {
                uploadImage(files[0]);
            }
        }, false);

        // Run on Mount
        window.addEventListener('DOMContentLoaded', () => {
            loadProfile();
        });
    </script>
</body>
</html>
