<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultSync - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
    <div class="alert-container" id="alertContainer"></div>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-name">VaultSync</span>
            </div>
            
            <ul class="sidebar-menu">
                <li class="menu-item active" id="menu-passwords" onclick="window.location.href = '/home'">
                    <button><i class="fas fa-key"></i> Passwords</button>
                    </li>
                <li class="menu-item" id="menu-notes" onclick="window.location.href = '/notes'">
                    <button><i class="fas fa-file-alt"></i> Secure Notes</button>
                </li>
            </ul>

            <div class="sidebar-footer">
                <li class="menu-item" style="list-style: none;">
                    <button onclick="handleLogout()" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Log Out</button>
                </li>
            </div>
        </aside>

        <!-- Main Body Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 class="page-title" id="pageTitle">Password Vault</h1>
            </header>

            <div class="content-body">
                <!-- PASSWORDS SCREEN -->
                <section id="view-passwords" class="screen-view active">
                    <div class="action-bar">
                        <div class="search-wrapper">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" class="search-input" id="searchPasswords" placeholder="Search passwords..." onkeyup="filterPasswords()">
                        </div>
                        <button class="btn btn-primary" onclick="openModal('addPasswordModal')">
                            <i class="fas fa-plus"></i> Add Password
                        </button>
                    </div>

                    <div id="passwordEmptyState" class="empty-state" style="display: none;">
                        <i class="fas fa-key empty-state-icon"></i>
                        <h3>No passwords saved yet</h3>
                        <p>Keep your account login credentials encrypted and safe.</p>
                    </div>

                    <div class="vault-grid" id="passwordsGrid">
                        <!-- Password Cards Dynamically Loaded here -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- ADD PASSWORD MODAL -->
    <div class="modal-overlay" id="addPasswordModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3 class="modal-title">Save Credentials</h3>
                <button class="modal-close" onclick="closeModal('addPasswordModal')">&times;</button>
            </div>
            <form id="addPasswordForm">
                <div class="form-group">
                    <label for="addWebName">Website or Application</label>
                    <input type="text" id="addWebName" class="input-control" placeholder="Google, GitHub, Netflix" required>
                </div>
                <div class="form-group">
                    <label for="addUsername">Username / Email</label>
                    <input type="text" id="addUsername" class="input-control" placeholder="VaultSync@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="addPassword">Password</label>
                    <div class="input-password-wrapper">
                        <input type="password" id="addPassword" class="input-control" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('addPassword', this)">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="addConfirmPassword">Confirm Password</label>
                    <div class="input-password-wrapper">
                        <input type="password" id="addConfirmPassword" class="input-control" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('addConfirmPassword', this)">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <!-- <div>
                    <label for="Date&Time">Date & Time</label>
                    <input type="text" id="Date&time" class="input-control" placeholder="  add date&time" required>
                </div> -->
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addPasswordModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Credential</button>
                </div>
            </form>
        </div>
    </div>

    <!-- EDIT PASSWORD MODAL -->
    <div class="modal-overlay" id="editPasswordModal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3 class="modal-title">Edit Credentials</h3>
                <button class="modal-close" onclick="closeModal('editPasswordModal')">&times;</button>
            </div>
            <form id="editPasswordForm">
                <input type="hidden" id="editPasswordId">
                <div class="form-group">
                    <label for="editWebName">Website or Application</label>
                    <input type="text" id="editWebName" class="input-control" required>
                </div>
                <div class="form-group">
                    <label for="editUsername">Username / Email</label>
                    <input type="text" id="editUsername" class="input-control" required>
                </div>
                <div class="form-group">
                    <label for="editPasswordVal">Password</label>
                    <div class="input-password-wrapper">
                        <input type="password" id="editPasswordVal" class="input-control" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('editPasswordVal', this)">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('editPasswordModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Credential</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-message" class="toast hidden" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script>
        let cachedPasswords = [];
        let currentUser = null;

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // JS Helper Functions
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeJsString(str) {
            if (!str) return '';
            return str
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'")
                .replace(/"/g, '\\"')
                .replace(/\n/g, '\\n')
                .replace(/\r/g, '\\r');
        }

        async function copyText(text, label) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(`${label} copied to clipboard!`, 'success');
            } catch (err) {
                console.error('Failed to copy: ', err);
                showToast('Failed to copy to clipboard.', 'error');
            }
        }

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'far fa-eye';
            }
        }

        function toggleCardPassword(btn, id) {
            const pwdVal = document.getElementById(`pwd-val-${id}`);
            const icon = btn.querySelector('i');
            
            if (pwdVal.dataset.visible === "false") {
                pwdVal.textContent = pwdVal.dataset.realPassword;
                pwdVal.dataset.visible = "true";
                icon.className = "far fa-eye-slash";
            } else {
                pwdVal.textContent = "••••••••";
                pwdVal.dataset.visible = "false";
                icon.className = "far fa-eye";
            }
        }

        // --- PROFILE LOADING ---
        async function loadProfile() {
            try {
                const response = await fetch('/api/user/profile');
                if (response.ok) {
                    const result = await response.json();
                    currentUser = result.user;
                } else if (response.status === 401) {
                    window.location.href = '/';
                }
            } catch (err) {
                console.error("Error loading user profile", err);
            }
        }

        // --- PASSWORD VAULT CONTROLLER ---
        async function fetchPasswords() {
            const grid = document.getElementById('passwordsGrid');
            const emptyState = document.getElementById('passwordEmptyState');
            grid.innerHTML = '';
            
            try {
                const response = await fetch('/api/passwords');
                if (response.ok) {
                    const result = await response.json();
                    cachedPasswords = result.passwords;
                    
                    if (cachedPasswords.length === 0) {
                        emptyState.style.display = 'block';
                        return;
                    }
                    emptyState.style.display = 'none';

                    cachedPasswords.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'vault-card glass';
                        card.id = `pwd-card-${item.id}`;
                        card.innerHTML = `
                            <div>
                                <div class="card-header">
                                    <div class="card-icon">${item.website_name.substring(0, 2).toUpperCase()}</div>
                                    <div class="card-title-group">
                                        <h4 class="card-site-name">${escapeHtml(item.website_name)}</h4>
                                        <p class="card-username">${escapeHtml(item.username)}</p>
                                    </div>
                                    <button class="btn-icon" title="Copy Username" onclick="copyText('${escapeJsString(item.username)}', 'Username')">
                                        <i class="far fa-user"></i>
                                    </button>
                                </div>
                                <div class="card-body">
                                    <span class="card-password-val" id="pwd-val-${item.id}" data-real-password="${escapeHtml(item.password)}" data-visible="false">••••••••</span>
                                    <div style="display: flex; gap: 0.35rem;">
                                        <button class="btn-icon" style="padding: 0.35rem;" onclick="toggleCardPassword(this, ${item.id})">
                                            <i class="far fa-eye"></i>
                                        </button>
                                        <button class="btn-icon" style="padding: 0.35rem;" title="Copy Password" onclick="copyText('${escapeJsString(item.password)}', 'Password')">
                                            <i class="far fa-copy"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-secondary btn-icon" style="padding: 0.45rem 0.75rem;" onclick="triggerEditPassword(${item.id})">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn btn-danger btn-icon" style="padding: 0.45rem 0.75rem;" onclick="deletePasswordRecord(${item.id})">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                console.error("Error retrieving passwords", err);
                showToast("Failed to fetch passwords.", "error");
            }
        }

        document.getElementById('addPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const website_name = document.getElementById('addWebName').value;
            const username = document.getElementById('addUsername').value;
            const password = document.getElementById('addPassword').value;
            const confirmPassword = document.getElementById('addConfirmPassword').value;

            if (password !== confirmPassword) {
                showToast("Passwords do not match.", "error");
                return;
            }

            try {
                const response = await fetch('/api/passwords', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ website_name, username, password })
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message, 'success');
                    closeModal('addPasswordModal');
                    document.getElementById('addPasswordForm').reset();
                    fetchPasswords();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to save password.", "error");
            }
        });

        function triggerEditPassword(id) {
            const item = cachedPasswords.find(p => p.id === id);
            if (!item) return;

            document.getElementById('editPasswordId').value = item.id;
            document.getElementById('editWebName').value = item.website_name;
            document.getElementById('editUsername').value = item.username;
            document.getElementById('editPasswordVal').value = item.password;
            
            openModal('editPasswordModal');
        }

        document.getElementById('editPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editPasswordId').value;
            const website_name = document.getElementById('editWebName').value;
            const username = document.getElementById('editUsername').value;
            const password = document.getElementById('editPasswordVal').value;

            try {
                const response = await fetch(`/api/passwords/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ website_name, username, password })
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message, 'success');
                    closeModal('editPasswordModal');
                    fetchPasswords();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to update credentials.", "error");
            }
        });

        async function deletePasswordRecord(id) {
            if (!confirm("Are you sure you want to delete these credentials?")) return;

            try {
                const response = await fetch(`/api/passwords/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message, 'success');
                    fetchPasswords();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (err) {
                console.error(err);
                showToast("Failed to delete record.", "error");
            }
        }

        function filterPasswords() {
            const query = document.getElementById('searchPasswords').value.toLowerCase();
            const cards = document.querySelectorAll('#passwordsGrid .vault-card');
            
            cards.forEach(card => {
                const siteName = card.querySelector('.card-site-name').textContent.toLowerCase();
                const username = card.querySelector('.card-username').textContent.toLowerCase();
                if (siteName.includes(query) || username.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Toast notification helpers
        function showToast(message, type) {
            const toast = document.getElementById('toast-message');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.remove('hidden');
            setTimeout(hideToast, 3000);
        }

        function hideToast() {
            const toast = document.getElementById('toast-message');
            toast.className = 'toast hidden';
        }

        // --- LOGOUT CONTROLLER ---
        async function handleLogout() {
            if (!confirm("Confirm logging out of VaultSync?")) return;
            try {
                const response = await fetch('/api/logout', { method: 'POST' });
                const result = await response.json();
                if (response.ok) {
                    localStorage.removeItem('currentUser');
                    window.location.href = result.redirect;
                }
            } catch (err) {
                console.error("Logout failed", err);
            }
        }

        // Run on Mount
        window.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            fetchPasswords();
        });
    </script>
</body>
</html>
